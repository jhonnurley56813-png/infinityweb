<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>breach.rip</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #00ff88;
            --text-primary: #ffffff;
            --text-secondary: #444444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            height: 250vh;
            overflow-x: hidden;
        }

        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }


        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
            transition: opacity 0.5s;
            animation: float 2s ease-in-out infinite;
        }

        .scroll-line {
            width: 1px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            margin: 10px auto 0;
            position: relative;
            overflow: hidden;
        }

        .scroll-line::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, var(--accent-color), transparent);
            animation: scrollLine 2s ease-in-out infinite;
        }

        @keyframes scrollLine {
            0% {
                top: -100%;
            }

            100% {
                top: 100%;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(-50%, 0);
            }

            50% {
                transform: translate(-50%, -10px);
            }
        }

        /* Centered Reveal Text */
        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            text-align: center;
            width: 100%;
            opacity: 0;
            /* Hidden by default */
            pointer-events: none;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 4.5rem);
            font-weight: 600;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
        }

        .green {
            color: var(--accent-color);
        }

        .coming-soon {
            font-size: 1.2rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <canvas id="star-canvas"></canvas>

    <div class="scroll-indicator" id="indicator">
        SCROLL
        <div class="scroll-line"></div>
    </div>

    <div class="content" id="reveal-content">
        <h1>breach<span class="green">.rip</span></h1>
        <p class="coming-soon">coming soon..</p>
    </div>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        const content = document.getElementById('reveal-content');
        const indicator = document.getElementById('indicator');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5,
                opacity: Math.random(),
                speed: Math.random() * 0.1
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();

                star.y -= star.speed;
                if (star.y < 0) star.y = canvas.height;
            });

            requestAnimationFrame(draw);
        }
        draw();

        // Scroll Logic
        window.addEventListener('scroll', () => {
            const scrollPos = window.scrollY;
            const windowHeight = window.innerHeight;

            // Star Parallax
            canvas.style.transform = `translateY(${scrollPos * 0.15}px)`;

            // Calculate opacity based on scroll
            let opacity = (scrollPos - 50) / (windowHeight * 0.6);
            if (opacity < 0) opacity = 0;
            if (opacity > 1) opacity = 1;

            content.style.opacity = opacity;

            // Subtle upward float as it reveals
            const floatOffset = 10 - (opacity * 10);
            content.style.transform = `translate(-50%, calc(-50% + ${floatOffset}px))`;

            // Fade out scroll indicator
            indicator.style.opacity = 1 - (scrollPos / 300);
        });
    </script>
</body>

</html>
